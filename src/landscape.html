<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DualView - Paysage</title>
  <style>
    :root {
      --border: #c0c0c0;
      --bg: #f8f8f8;
      --fg: #1a1a1a;
      --label-bg: rgba(0,0,0,0.55);
    }
    [data-theme="dark"] {
      --border: #444;
      --bg: #1a1a1a;
      --fg: #e8e8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Bandeau OBS label */
    #obs-label {
      position: fixed;
      top: 6px;
      right: 8px;
      background: var(--label-bg);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.7;
    }

    #webview-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    webview {
      width: 100%;
      height: 100%;
      display: flex;
      border: none;
    }

    /* Page d'accueil (quand pas d'URL) */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--fg);
      opacity: 0.5;
      pointer-events: none;
    }

    #empty-state .icon { font-size: 48px; }
    #empty-state .text { font-size: 16px; font-weight: 500; }
    #empty-state .sub  { font-size: 13px; }
  </style>
</head>
<body>

  <div id="obs-label">🔴 PAYSAGE — 16:9</div>

  <div id="webview-container">
    <div id="empty-state">
      <div class="icon">🖥️</div>
      <div class="text">Vue Paysage (Desktop)</div>
      <div class="sub">Entrez une URL dans la fenêtre de contrôle</div>
    </div>
    <webview
      id="webview"
      src="about:blank"
      useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
      allowpopups
      style="display:none;"
    ></webview>
  </div>

  <script>
    const webview = document.getElementById('webview');
    const emptyState = document.getElementById('empty-state');

    // ── Thème ──────────────────────────────────────────────
    window.dualview.getTheme().then(theme => {
      document.documentElement.setAttribute('data-theme', theme);
    });
    window.dualview.on('theme-changed', theme => {
      document.documentElement.setAttribute('data-theme', theme);
    });

    // ── Gestion du scroll ─────────────────────────────────
    let scrollTimeout = null;
    let isApplyingScroll = false;

    // Envoyer le scroll vers le processus principal (→ portrait)
    webview.addEventListener('dom-ready', () => {
      webview.addEventListener('ipc-message', () => {});

      // Injecter le listener de scroll dans la webview
      webview.executeJavaScript(`
        (function() {
          let lastScrollSent = -1;
          window.addEventListener('scroll', function() {
            const el = document.documentElement;
            const scrollTop = el.scrollTop || document.body.scrollTop;
            const maxScroll = el.scrollHeight - el.clientHeight;
            if (maxScroll <= 0) return;
            const pct = scrollTop / maxScroll;
            if (Math.abs(pct - lastScrollSent) > 0.001) {
              lastScrollSent = pct;
              // On ne peut pas utiliser IPC depuis la webview directement
              // On stocke dans une variable globale que le parent lira
              window.__dualviewScrollPct = pct;
            }
          }, { passive: true });
        })();
        true;
      `).catch(() => {});
    });

    // Polling du scroll depuis la webview (toutes les 100ms)
    let lastScrollPct = -1;
    setInterval(() => {
      if (webview.getURL && webview.getURL() !== 'about:blank') {
        webview.executeJavaScript('window.__dualviewScrollPct || 0')
          .then(pct => {
            if (typeof pct === 'number' && Math.abs(pct - lastScrollPct) > 0.001) {
              lastScrollPct = pct;
              window.dualview.sendScroll(pct);
            }
          })
          .catch(() => {});
      }
    }, 100);

    // ── Chargement d'URL ──────────────────────────────────
    function loadUrl(url) {
      if (!url || url === 'about:blank') {
        webview.style.display = 'none';
        emptyState.style.display = 'flex';
        return;
      }
      emptyState.style.display = 'none';
      webview.style.display = 'flex';
      webview.src = url;
    }

    window.dualview.on('load-url', loadUrl);

    // Écouter les navigations in-page pour informer le contrôle
    webview.addEventListener('did-navigate', (e) => {
      if (e.url && e.url !== 'about:blank') {
        window.dualview.sendNavigate(e.url);
      }
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      if (e.url && e.url !== 'about:blank') {
        window.dualview.sendNavigate(e.url);
      }
    });

    // ── URL initiale ──────────────────────────────────────
    window.dualview.getCurrentUrl().then(url => {
      if (url) loadUrl(url);
    });
  </script>
</body>
</html>
