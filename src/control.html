<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DualView - Controle</title>
  <style>
    :root {
      --bg:         #f0f0f0;
      --bg-alt:     #e0e0e0;
      --bg-tab:     #d8d8d8;
      --bg-tab-act: #ffffff;
      --fg:         #1a1a1a;
      --fg-muted:   #666666;
      --accent:     #0066cc;
      --accent-h:   #0055aa;
      --border:     #c0c0c0;
      --input-bg:   #ffffff;
      --btn-pause:  #e67e00;
      --btn-resume: #28a745;
      --danger:     #dc3545;
      --tab-close:  #888888;
      --nav-btn:    #f5f5f5;
      --nav-btn-h:  #e0e0e0;
      --nav-dis:    #cccccc;
    }
    [data-theme="dark"] {
      --bg:         #1e1e1e;
      --bg-alt:     #2a2a2a;
      --bg-tab:     #2e2e2e;
      --bg-tab-act: #3c3c3c;
      --fg:         #e8e8e8;
      --fg-muted:   #999999;
      --accent:     #4da6ff;
      --accent-h:   #66b3ff;
      --border:     #444444;
      --input-bg:   #333333;
      --nav-btn:    #2e2e2e;
      --nav-btn-h:  #444444;
      --nav-dis:    #444444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Barre d'onglets ───────────────────────────────────── */
    #tab-bar {
      display: flex;
      align-items: center;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      padding: 4px 6px 0;
      gap: 3px;
      min-height: 36px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }
    #tab-bar::-webkit-scrollbar { height: 3px; }
    #tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tab {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg-tab);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 5px 10px 5px 12px;
      font-size: 12px; cursor: pointer;
      white-space: nowrap; max-width: 160px;
      transition: background 0.15s; flex-shrink: 0;
    }
    .tab:hover { background: var(--bg-tab-act); }
    .tab.active {
      background: var(--bg-tab-act);
      border-bottom: 1px solid var(--bg-tab-act);
      margin-bottom: -1px; font-weight: 500;
    }
    .tab-title { overflow: hidden; text-overflow: ellipsis; color: var(--fg); pointer-events: none; }
    .tab-close {
      background: none; border: none; color: var(--tab-close);
      cursor: pointer; font-size: 14px; line-height: 1;
      padding: 0 1px; border-radius: 3px; pointer-events: all;
      transition: color 0.15s, background 0.15s;
    }
    .tab-close:hover { color: var(--danger); background: rgba(220,53,69,0.12); }

    #add-tab-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 50%; width: 24px; height: 24px;
      font-size: 16px; color: var(--fg-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, color 0.15s; margin-left: 2px;
    }
    #add-tab-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Barre d'adresse ───────────────────────────────────── */
    #toolbar {
      display: flex; align-items: center;
      padding: 6px 8px; gap: 6px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex: 1;
    }

    /* Boutons navigation back/forward */
    .nav-arrow {
      width: 30px; height: 30px;
      background: var(--nav-btn);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      line-height: 1;
    }
    .nav-arrow:hover:not(:disabled) { background: var(--nav-btn-h); }
    .nav-arrow:disabled {
      color: var(--nav-dis);
      border-color: var(--nav-dis);
      cursor: default;
      opacity: 0.5;
    }
    [data-theme="dark"] .nav-arrow:disabled { color: #555; border-color: #444; }

    #url-form {
      display: flex; flex: 1; gap: 6px; align-items: center;
    }

    #url-input {
      flex: 1; padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--input-bg); color: var(--fg);
      font-size: 13px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #url-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,102,204,0.2);
    }
    [data-theme="dark"] #url-input:focus {
      box-shadow: 0 0 0 2px rgba(77,166,255,0.2);
    }

    #go-btn {
      padding: 6px 14px;
      background: var(--accent); color: white;
      border: none; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    #go-btn:hover { background: var(--accent-h); }

    .sync-btn {
      padding: 6px 10px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      white-space: nowrap; transition: background 0.15s, opacity 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    #resize-btn  { background: var(--btn-pause);  color: white; }
    #resize-btn:hover  { opacity: 0.85; }
    #resume-btn  { background: var(--btn-resume); color: white; display: none; }
    #resume-btn:hover  { opacity: 0.85; }

    /* ── Barre de statut ───────────────────────────────────── */
    #status-bar {
      display: flex; align-items: center;
      padding: 3px 10px; gap: 10px;
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--fg-muted);
    }
    #sync-indicator { display: flex; align-items: center; gap: 4px; }
    #sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #28a745; transition: background 0.3s;
    }
    #sync-dot.paused { background: var(--btn-pause); }
    #adblock-label { color: #28a745; font-weight: 500; }
    #version-label { margin-left: auto; }
  </style>
</head>
<body>

  <div id="tab-bar">
    <button id="add-tab-btn" title="Nouvel onglet">+</button>
  </div>

  <div id="toolbar">
    <!-- Boutons navigation -->
    <button id="back-btn"    class="nav-arrow" title="Page precedente" disabled>&#8592;</button>
    <button id="forward-btn" class="nav-arrow" title="Page suivante"   disabled>&#8594;</button>

    <div id="url-form">
      <input type="text" id="url-input" placeholder="https://exemple.com" autocomplete="off" spellcheck="false"/>
      <button id="go-btn">Charger</button>
    </div>

    <button id="resize-btn" class="sync-btn" title="Pause sync pour redimensionner Portrait">&#8596;</button>
    <button id="resume-btn" class="sync-btn" title="Valider et reprendre la sync">Valider</button>
  </div>

  <div id="status-bar">
    <div id="sync-indicator">
      <span id="sync-dot"></span>
      <span id="sync-label">Synchronisation active</span>
    </div>
    <span id="adblock-label">Bloqueur pub actif</span>
    <span id="version-label">v0.2.2</span>
  </div>

  <script>
    // ── Theme ────────────────────────────────────────────────
    window.dualview.getTheme().then(t => document.documentElement.setAttribute('data-theme', t));
    window.dualview.on('theme-changed', t => document.documentElement.setAttribute('data-theme', t));

    // ── Version ──────────────────────────────────────────────
    window.dualview.getVersion().then(v => {
      document.getElementById('version-label').textContent = 'v' + v;
    });

    // ── Boutons navigation back/forward ──────────────────────
    const backBtn    = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');

    function updateNavButtons(state) {
      backBtn.disabled    = !state.canGoBack;
      forwardBtn.disabled = !state.canGoForward;
    }

    // Mise a jour a chaque navigation
    // Note : etat initial = desactive (aucun historique au demarrage)
    // Mis a jour automatiquement via nav-state-changed apres la premiere navigation
    window.dualview.on('nav-state-changed', updateNavButtons);

    backBtn.addEventListener('click', () => {
      if (!backBtn.disabled) window.dualview.navBack();
    });
    forwardBtn.addEventListener('click', () => {
      if (!forwardBtn.disabled) window.dualview.navForward();
    });

    // ── Onglets ──────────────────────────────────────────────
    let tabs = [];
    let activeTabId = null;

    function renderTabs() {
      const bar    = document.getElementById('tab-bar');
      const addBtn = document.getElementById('add-tab-btn');
      bar.querySelectorAll('.tab').forEach(el => el.remove());

      tabs.forEach(tab => {
        const el    = document.createElement('div');
        el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
        el.dataset.id = tab.id;

        const title = document.createElement('span');
        title.className   = 'tab-title';
        title.textContent = tab.title || 'Nouvel onglet';

        el.appendChild(title);

        if (tabs.length > 1) {
          const closeBtn = document.createElement('button');
          closeBtn.className   = 'tab-close';
          closeBtn.innerHTML   = '&times;';
          closeBtn.title       = 'Fermer';
          closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
          el.appendChild(closeBtn);
        }

        el.addEventListener('click', () => switchTab(tab.id));
        bar.insertBefore(el, addBtn);
      });
    }

    function switchTab(id) {
      activeTabId = id;
      const tab = tabs.find(t => t.id === id);
      if (tab) {
        document.getElementById('url-input').value = tab.url || '';
        if (tab.url) window.dualview.navigate(tab.url);
      }
      // Reinitialiser les boutons nav (historique different par onglet)
      updateNavButtons({ canGoBack: false, canGoForward: false });
      renderTabs();
      saveTabs();
    }

    function addTab() {
      const id = 'tab-' + Date.now();
      tabs.push({ id, title: 'Nouvel onglet', url: '' });
      switchTab(id);
    }

    function closeTab(id) {
      if (tabs.length <= 1) return;
      const idx = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      if (activeTabId === id) {
        switchTab(tabs[Math.max(0, idx - 1)].id);
      } else {
        renderTabs(); saveTabs();
      }
    }

    function saveTabs() {
      window.dualview.saveTabs({ tabs, activeTabId });
    }

    window.dualview.getStore().then(({ tabs: st, activeTabId: sa }) => {
      tabs = (st && st.length > 0) ? st : [{ id: 'tab-1', title: 'Onglet 1', url: '' }];
      activeTabId = sa || tabs[0].id;
      const active = tabs.find(t => t.id === activeTabId);
      if (active) {
        document.getElementById('url-input').value = active.url || '';
        if (active.url) window.dualview.navigate(active.url);
      }
      renderTabs();
    });

    document.getElementById('add-tab-btn').addEventListener('click', addTab);

    // ── Navigation URL ────────────────────────────────────────
    function navigate() {
      let url = document.getElementById('url-input').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
      document.getElementById('url-input').value = url;

      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) {
        tab.url = url;
        try {
          const host = new URL(url).hostname.replace('www.', '');
          tab.title  = host.length > 16 ? host.slice(0, 16) + '...' : host;
        } catch { tab.title = url.slice(0, 20); }
        renderTabs(); saveTabs();
      }
      // Reinitialiser les boutons nav sur nouvelle navigation
      updateNavButtons({ canGoBack: false, canGoForward: false });
      window.dualview.navigate(url);
    }

    document.getElementById('go-btn').addEventListener('click', navigate);
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') navigate();
    });

    // Mise a jour barre d'adresse depuis navigation in-page (paysage)
    window.dualview.on('update-addressbar', url => {
      document.getElementById('url-input').value = url;
      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) {
        tab.url = url;
        try {
          const host = new URL(url).hostname.replace('www.', '');
          tab.title  = host.length > 16 ? host.slice(0, 16) + '...' : host;
        } catch { tab.title = url.slice(0, 20); }
        renderTabs(); saveTabs();
      }
    });

    // ── Sync / Redimensionnement ──────────────────────────────
    document.getElementById('resize-btn').addEventListener('click', () => {
      document.getElementById('resize-btn').style.display = 'none';
      document.getElementById('resume-btn').style.display = 'flex';
      document.getElementById('sync-dot').classList.add('paused');
      document.getElementById('sync-label').textContent = 'Pause - Redimensionnez Portrait';
      window.dualview.pauseSync();
    });

    document.getElementById('resume-btn').addEventListener('click', () => {
      document.getElementById('resume-btn').style.display = 'none';
      document.getElementById('resize-btn').style.display = 'flex';
      document.getElementById('sync-dot').classList.remove('paused');
      document.getElementById('sync-label').textContent = 'Synchronisation active';
      window.dualview.resumeSync();
    });
  </script>
</body>
</html>
