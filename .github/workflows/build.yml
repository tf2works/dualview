# DualView — Build & Release automatique
#
# Déclenché sur :
#   - Push de tag v* (ex. v0.4.5) → build toutes plateformes + GitHub Release
#   - Push sur main               → build de vérification (sans release)
#   - Pull Request vers main      → build de vérification
#
# Artefacts produits :
#   - dist/DualView Setup 0.4.5.exe              (Windows x64, NSIS)
#   - dist/DualView-0.4.5.dmg                    (macOS x64)
#   - dist/DualView-0.4.5-arm64.dmg              (macOS arm64)
#   - dist/DualView-0.4.5.AppImage               (Linux x64)
#   - dist/dualview_0.4.5_amd64.deb              (Linux x64, Debian/Ubuntu)
#
# Architecture :
#   Les jobs build-* compilent uniquement (--publish never).
#   Le job release agrège les artefacts et crée la GitHub Release.
#   Cela évite le conflit avec la publication implicite d'electron-builder
#   sur les tags (comportement supprimé en v27, désactivé ici explicitement).

name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write   # Nécessaire pour créer une GitHub Release

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        # --publish never : on désactive la publication implicite d'electron-builder
        # Le job release s'occupe de l'upload vers GitHub
        run: npm run build:win -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualView-windows-x64
          path: |
            dist/*.exe
            !dist/*-unpacked/**
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (x64 + arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS)
        run: npm run build:mac -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualView-macos
          path: dist/*.dmg
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rpm \
            dpkg \
            fakeroot \
            libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build (Linux)
        run: npm run build:linux -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DualView-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    # Uniquement sur les tags v*
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist-all/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-all/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}